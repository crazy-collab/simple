<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      color: #ffffff;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    p {
      color: #888;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #4ade80;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>My Botpress Bot</h1>
    <p>Click the chat bubble in the bottom right corner to start</p>
    <div class="status">
      <span class="dot"></span> Bot is online
    </div>
  </div>

  <!-- Botpress Webchat Scripts -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/04/13/06/20260413063008-S4GFTVBZ.js" defer></script>

</body>
</html>
